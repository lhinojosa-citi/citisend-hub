<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Citisend HUB · Acceso</title>
  <link rel="stylesheet" href="assets/style.css?v=2.0.2" />
</head>
<body class="access-body">
  <main class="access-screen">
    <section class="access-card">
      <div class="access-brand">
        <img src="assets/logo-citisend.png" alt="Citisend" />
        <span>HUB</span>
      </div>
      <div class="access-copy">
        <span class="label">Plataforma de operaciones</span>
        <h1>Acceso por proyecto</h1>
        <p>Selecciona el proyecto asignado e introduce su contraseña para consultar únicamente la documentación relacionada.</p>
      </div>

      <form id="projectAccessForm" class="access-form">
        <label>
          <span>Proyecto</span>
          <select id="accessProject" required>
            <option value="">Cargando proyectos...</option>
          </select>
        </label>
        <label>
          <span>Contraseña del proyecto</span>
          <input id="accessPassword" type="password" placeholder="Introduce la contraseña" autocomplete="current-password" required />
        </label>
        <button class="btn primary access-btn" type="submit">Entrar al proyecto →</button>
        <p id="accessError" class="access-error" hidden>Proyecto o contraseña incorrectos.</p>
      </form>

      <div class="admin-access-box">
        <button id="showAdminAccess" type="button">Acceso Administración</button>
        <form id="adminAccessForm" class="admin-mini-form" hidden>
          <input id="adminPassword" type="password" placeholder="Contraseña administración" autocomplete="current-password" />
          <button class="btn secondary" type="submit">Entrar</button>
          <small id="adminError" hidden>Contraseña incorrecta.</small>
        </form>
      </div>

      <div class="access-footer">Citisend HUB · v2.0.2</div>
    </section>

  </main>

  <script>
    const DEFAULT_ADMIN_PASSWORD = 'Citisend2026';
    let accessData = {admin:{password:DEFAULT_ADMIN_PASSWORD}, proyectos:{}};

    async function loadAccess(){
      try{
        const response = await fetch('data/accesos.json?v=2.0.1', {cache:'no-store'});
        if(response.ok) accessData = await response.json();
      }catch(error){}
      renderProjectOptions();
    }

    function renderProjectOptions(){
      const select = document.getElementById('accessProject');
      const entries = Object.entries(accessData.proyectos || {}).filter(([id, item]) => item.visible !== false);
      select.innerHTML = '<option value="">Selecciona un proyecto</option>' + entries.map(([id, item]) => `<option value="${id}">${item.nombre || id}</option>`).join('');
    }

    document.getElementById('projectAccessForm').addEventListener('submit', event => {
      event.preventDefault();
      const projectId = document.getElementById('accessProject').value;
      const password = document.getElementById('accessPassword').value;
      const project = accessData.proyectos?.[projectId];
      if(project && password === project.password){
        sessionStorage.setItem('citisendRole','project');
        sessionStorage.setItem('citisendProject', projectId);
        window.location.href = `proyecto.html?id=${encodeURIComponent(projectId)}&view=instalador`;
        return;
      }
      document.getElementById('accessError').hidden = false;
    });

    document.getElementById('showAdminAccess').addEventListener('click', () => {
      document.getElementById('adminAccessForm').hidden = false;
      document.getElementById('adminPassword').focus();
    });

    document.getElementById('adminAccessForm').addEventListener('submit', event => {
      event.preventDefault();
      const password = document.getElementById('adminPassword').value;
      const adminPass = accessData.admin?.password || DEFAULT_ADMIN_PASSWORD;
      if(password === adminPass){
        sessionStorage.setItem('citisendRole','admin');
        window.location.href = 'hub.html';
        return;
      }
      document.getElementById('adminError').hidden = false;
    });

    loadAccess();
  </script>
</body>
</html>
